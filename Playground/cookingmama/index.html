<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image" href="./src/assets/cookingmama.png" />
    <title>Cooking Mama</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
  </head>
  <body>
    <header class="bg-dark text-white p-3 mb-4">
      <div class="container d-flex align-items-center gap-4">
        <h1>Cooking Mama</h1>
        <img
          src="./src/assets/cookingmama.png"
          alt="Cooking Mama Logo"
          width="50"
          height="75"
        />
      </div>
    </header>

    <main class="container">
      <div class="row g-2">
        <!-- Pantry Ingredients -->
        <section class="col-12 col-lg-7">
          <div class="card shadow-xl">
            <div class="card-header">Pantry Ingredients</div>
            <div class="card-body">
              <table class="table table-striped">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th class="text-end">Cal</th>
                    <th class="text-end">P</th>
                    <th class="text-end">C</th>
                    <th class="text-end">F</th>
                  </tr>
                </thead>
                <!-- Display the pantry ingredients here. -->
                <tbody id="pantry-ingredients" class="align-middle"></tbody>
              </table>
            </div>
          </div>
        </section>

        <div class="col-12 col-lg-5 d-flex flex-column gap-2">
          <!-- Current Recipe -->
          <section class="card shadow-xl h-100">
            <div class="card-header">Current Recipe</div>
            <div class="card-body">
              <!-- Display the ingredients for the current recipe here. -->
              <table class="table table-striped">
                <thead>
                  <tr>
                    <th>Ingredient</th>
                    <th>Grams</th>
                    <th></th>
                  </tr>
                </thead>
                <!-- Display the current recipe ingredients here. -->
                <tbody id="recipe-ingredients-list" class="align-middle">
                  <tr>
                    <td colspan="3" class="text-secondary p-5">
                      Add Ingredients from the Pantry to Start a New Recipe
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
          <!-- Total Macros -->
          <section class="card shadow-xl">
            <div class="card-header">Totals</div>
            <div class="card-body">
              <div class="row g-2">
                <div class="col-6">
                  <div class="p-2 border rounded bg-secondary text-light">
                    <h2 class="fs-6">Calories</h2>
                    <p id="calories" class="p-0 m-0">0</p>
                  </div>
                </div>
                <div class="col-6">
                  <div class="p-2 border rounded bg-success text-light">
                    <h2 class="fs-6">Protein</h2>
                    <p id="protein" class="p-0 m-0">0</p>
                  </div>
                </div>
                <div class="col-6">
                  <div class="p-2 border rounded bg-primary text-light">
                    <h2 class="fs-6">Carbs</h2>
                    <p id="carbs" class="p-0 m-0">0</p>
                  </div>
                </div>
                <div class="col-6">
                  <div class="p-2 border rounded bg-danger text-light">
                    <h2 class="fs-6">Fat</h2>
                    <p id="fat" class="p-0 m-0">0</p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>

        <section class="col-12 col-lg-12">
          <div class="card shadow-xl">
            <div class="card-header">Add Recipe</div>
            <div class="card-body">
              <div class="row g-2">
                <div class="col-4">
                  <label for="recipe-name">Recipe Name</label>
                  <input
                    type="text"
                    id="recipe-name"
                    class="form-control"
                    placeholder="eg. Lunch Bowl"
                  />
                </div>
                <div class="col-4">
                  <label for="recipe-category">Category</label>
                  <select id="recipe-category" class="form-select">
                    <option value="Regular">Regular</option>
                    <option value="Vegetarian">Vegetarian</option>
                  </select>
                </div>
                <div class="col-4 d-flex gap-2 align-items-end">
                  <button id="clear-btn" class="btn p-2 btn-danger btn-sm">
                    Clear Form
                  </button>
                  <button id="save-btn" class="btn p-2 btn-success btn-sm">
                    Save
                  </button>
                  <button id="load-btn" class="btn p-2 btn-warning btn-sm">
                    Load
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
      <!-- Load Recipe Modal -->
      <div class="modal fade" id="load-modal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Saved Recipes</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <div class="modal-body">
              <ul id="saved-recipes-list" class="list-group"></ul>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Close
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Toast -->
      <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div
          id="toast"
          class="toast align-items-center text-white border-0"
          role="alert"
        >
          <div class="d-flex">
            <div id="toast-message" class="toast-body"></div>
            <button
              type="button"
              class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast"
            ></button>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
